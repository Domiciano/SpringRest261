<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Roles y Permisos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100">

    <!-- Navbar -->
    <nav class="bg-indigo-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 14l9-5-9-5-9 5 9 5z"/>
                    </svg>
                </div>
                <span class="text-white font-bold text-lg">Campus Portal</span>
                <span class="text-indigo-300 text-sm">/ Panel de Administración</span>
            </div>
            <div class="flex items-center gap-3">
                <a th:href="@{/auth/profile}" class="text-sm text-indigo-300 hover:text-white transition">Mi perfil</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit"
                            class="text-sm bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg transition">
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Sidebar + Content -->
    <div class="max-w-7xl mx-auto px-4 py-8 flex gap-6">

        <!-- Sidebar -->
        <aside class="w-52 flex-shrink-0">
            <nav class="bg-white rounded-xl shadow p-3 space-y-1">
                <a th:href="@{/admin/users}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 font-medium text-sm transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    Usuarios
                </a>
                <a th:href="@{/admin/roles}"
                   class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-indigo-50 text-indigo-700 font-medium text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    Roles y Permisos
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <div class="flex-1 min-w-0 space-y-6">
            <div class="flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">Roles y Permisos</h1>
            </div>

            <!-- Card por rol -->
            <div th:each="role : ${roles}" class="bg-white rounded-2xl shadow overflow-hidden">

                <!-- Role header -->
                <div class="px-6 py-4 bg-gradient-to-r from-indigo-600 to-indigo-500 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                            </svg>
                        </div>
                        <h2 class="text-white font-bold text-lg" th:text="${role.name}"></h2>
                    </div>
                    <span class="text-indigo-200 text-sm"
                          th:text="${#lists.size(role.rolePermissions)} + ' permiso(s)'"></span>
                </div>

                <div class="p-6">
                    <!-- Permisos actuales -->
                    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Permisos asignados</p>
                    <div class="flex flex-wrap gap-2 mb-6">
                        <th:block th:each="rp : ${role.rolePermissions}">
                            <span class="inline-flex items-center gap-1.5 bg-green-50 border border-green-200 text-green-800 text-xs font-medium px-2.5 py-1.5 rounded-full">
                                <svg class="w-3 h-3 text-green-600" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                                </svg>
                                <span th:text="${rp.permission.name}"></span>
                                <form th:action="@{'/admin/roles/' + ${role.id} + '/remove-permission'}" method="post" class="inline">
                                    <input type="hidden" name="permissionId" th:value="${rp.permission.id}">
                                    <button type="submit"
                                            class="ml-0.5 text-green-600 hover:text-red-600 transition font-bold leading-none"
                                            title="Quitar permiso">×</button>
                                </form>
                            </span>
                        </th:block>
                        <span th:if="${#lists.isEmpty(role.rolePermissions)}"
                              class="text-gray-400 text-xs italic">Sin permisos asignados</span>
                    </div>

                    <!-- Asignar permiso -->
                    <div class="border-t border-gray-100 pt-4">
                        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Asignar permiso</p>
                        <form th:action="@{'/admin/roles/' + ${role.id} + '/assign-permission'}" method="post"
                              class="flex items-center gap-2 flex-wrap">
                            <select name="permissionId"
                                    class="text-sm border border-gray-200 rounded-lg px-3 py-2 text-gray-700
                                           focus:outline-none focus:ring-2 focus:ring-indigo-400 min-w-48">
                                <option th:each="p : ${permissions}"
                                        th:value="${p.id}"
                                        th:text="${p.name}"></option>
                            </select>
                            <button type="submit"
                                    class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition font-medium">
                                + Asignar
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
